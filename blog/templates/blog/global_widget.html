<section id="global-chat-widget" class="gcw-shell" aria-label="Global blog chat widget">
  <button id="gcw-toggle" class="gcw-toggle" type="button" aria-expanded="false" aria-controls="gcw-panel">
    Global Chat
  </button>

  <div id="gcw-panel" class="gcw-panel" hidden>
    <header class="gcw-header">
      <h2>Global Blog Chat</h2>
      <p>Live room for all signed-in users</p>
    </header>

    <p id="gcw-status" class="gcw-status" role="status" aria-live="polite">Connecting...</p>

    <div id="gcw-log" class="gcw-log" role="log" aria-live="polite" aria-relevant="additions"></div>

    <form id="gcw-form" class="gcw-form" aria-label="Send global chat message">
      <label class="gcw-sr-only" for="gcw-input">Message</label>
      <input id="gcw-input" type="text" maxlength="1000" placeholder="Write a message..." required>
      <button type="submit">Send</button>
    </form>
  </div>
</section>

<script>
  function gcwAppend(log, payload) {
    const article = document.createElement("article");
    article.className = "gcw-msg";

    const header = document.createElement("header");
    const author = document.createElement("strong");
    const time = document.createElement("time");
    const body = document.createElement("p");

    author.textContent = payload.username;
    time.textContent = payload.created_at;
    body.textContent = payload.message;

    header.appendChild(author);
    header.appendChild(time);
    article.appendChild(header);
    article.appendChild(body);
    log.appendChild(article);
    log.scrollTop = log.scrollHeight;
  }

  (function initGlobalChatWidget() {
    const toggle = document.getElementById("gcw-toggle");
    const panel = document.getElementById("gcw-panel");
    const log = document.getElementById("gcw-log");
    const form = document.getElementById("gcw-form");
    const input = document.getElementById("gcw-input");
    const status = document.getElementById("gcw-status");
    const submitButton = form.querySelector("button[type='submit']");

    if (!toggle || !panel || !log || !form || !input) {
      return;
    }

    submitButton.disabled = true;

    toggle.addEventListener("click", function () {
      const expanded = toggle.getAttribute("aria-expanded") === "true";
      toggle.setAttribute("aria-expanded", expanded ? "false" : "true");
      panel.hidden = expanded;
    });

    fetch("/chat/api/global/messages/", { credentials: "same-origin" })
      .then((response) => response.ok ? response.json() : { messages: [] })
      .then((data) => {
        data.messages.forEach((msg) => gcwAppend(log, msg));
      })
      .catch(() => null);

    const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
    const wsUrl = `${wsScheme}://${window.location.host}/ws/chat/global/`;
    let socket = null;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    let isUnmounted = false;

    function connectSocket() {
      if (isUnmounted) {
        return;
      }

      status.textContent = reconnectAttempts > 0 ? "Reconnecting..." : "Connecting...";
      socket = new WebSocket(wsUrl);

      socket.onopen = function () {
        reconnectAttempts = 0;
        status.textContent = "Connected";
        submitButton.disabled = false;
      };

      socket.onmessage = function (event) {
        const data = JSON.parse(event.data);
        if (data.type === "chat.message") {
          gcwAppend(log, data);
        }
      };

      socket.onerror = function () {
        status.textContent = "Connection error. Trying to reconnect...";
      };

      socket.onclose = function () {
        submitButton.disabled = true;
        if (isUnmounted) {
          return;
        }
        reconnectAttempts += 1;
        const waitMs = Math.min(10000, 1000 * Math.pow(2, reconnectAttempts - 1));
        status.textContent = "Disconnected. Reconnecting...";
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
        }
        reconnectTimer = setTimeout(connectSocket, waitMs);
      };
    }

    window.addEventListener("beforeunload", function () {
      isUnmounted = true;
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
      }
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.close();
      }
    });

    connectSocket();

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      const message = input.value.trim();
      if (!message || !socket || socket.readyState !== WebSocket.OPEN) {
        status.textContent = "Waiting for the websocket connection...";
        return;
      }
      socket.send(JSON.stringify({ message }));
      input.value = "";
    });
  })();
</script>
