{% load static %}

<!-- Generated by GitHub Copilot -->
<button
  type="button"
  class="cc-game-fab"
  id="cc-game-open"
  aria-label="Open number guess game"
  aria-haspopup="dialog"
>
  <span class="cc-game-fab-icon" aria-hidden="true">🎮</span>
  <span class="cc-game-fab-text">Game</span>
</button>

<!-- Generated by GitHub Copilot -->
<dialog
  class="cc-game-dialog"
  id="cc-game-dialog"
  aria-labelledby="cc-game-dialog-title"
>
  <div class="cc-game-dialog-header">
    <h2 id="cc-game-dialog-title">Code Challenge Game</h2>
    <button type="button" class="cc-game-close" id="cc-game-close" aria-label="Close game popup">Close</button>
  </div>

  <section class="cc-game-widget" aria-label="Click challenge game">
    <p class="cc-game-subtitle">Click as fast as you can in 10 seconds.</p>

    <div class="cc-game-stats" aria-live="polite">
      <div class="cc-game-stat-card">
        <span class="cc-game-stat-label">Time Left</span>
        <span class="cc-game-stat-value" id="cc-game-time-left">10.0s</span>
      </div>
      <div class="cc-game-stat-card">
        <span class="cc-game-stat-label">Clicks</span>
        <span class="cc-game-stat-value" id="cc-game-click-count">0</span>
      </div>
      <div class="cc-game-stat-card">
        <span class="cc-game-stat-label">CPS</span>
        <span class="cc-game-stat-value" id="cc-game-cps">0.00</span>
      </div>
    </div>

    <div class="cc-game-controls" aria-label="Game controls">
      <button type="button" class="cc-game-button cc-game-button-primary" id="cc-game-start-btn">Start</button>
      <button type="button" class="cc-game-button cc-game-button-secondary" id="cc-game-restart-btn">Restart</button>
    </div>

    <button type="button" class="cc-game-click-area cc-game-click-area-disabled" id="cc-game-click-area" aria-disabled="true">
      Press Start to Play
    </button>

    <p class="cc-game-result" id="cc-game-final-result" role="status" aria-live="polite">
      Press Start to begin the 10-second challenge.
    </p>
  </section>
</dialog>

<!-- Generated by GitHub Copilot -->
<script src="{% static 'blog/cc-games.js' %}"></script>
