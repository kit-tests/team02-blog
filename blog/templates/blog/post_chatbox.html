<section class="pc-shell" aria-label="Post specific chatbox">
  <header class="pc-header">
    <p class="pc-kicker">Article Discussion</p>
    <h2>Chat About This Post</h2>
    <p>Only signed-in users can join this real-time room.</p>
  </header>

  <p id="pc-status-{{ post.slug }}" class="pc-status" role="status" aria-live="polite">Connecting...</p>

  <div id="pc-log-{{ post.slug }}" class="pc-log" role="log" aria-live="polite" aria-relevant="additions"></div>

  <form id="pc-form-{{ post.slug }}" class="pc-form" aria-label="Send message to article chat">
    <label class="pc-sr-only" for="pc-input-{{ post.slug }}">Message</label>
    <input id="pc-input-{{ post.slug }}" type="text" maxlength="1000" placeholder="Share your thoughts..." required>
    <button type="submit">Send</button>
  </form>
</section>

{{ post.slug|json_script:"pc-room-slug" }}

<script>
  function pcAppend(log, payload) {
    const row = document.createElement("article");
    row.className = "pc-msg";

    const header = document.createElement("header");
    const author = document.createElement("strong");
    const stamp = document.createElement("time");
    const body = document.createElement("p");

    author.textContent = payload.username;
    stamp.textContent = payload.created_at;
    body.textContent = payload.message;

    header.appendChild(author);
    header.appendChild(stamp);
    row.appendChild(header);
    row.appendChild(body);
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
  }

  (function initPostChatbox() {
    const slug = JSON.parse(document.getElementById("pc-room-slug").textContent);
    const log = document.getElementById(`pc-log-${slug}`);
    const form = document.getElementById(`pc-form-${slug}`);
    const input = document.getElementById(`pc-input-${slug}`);
    const status = document.getElementById(`pc-status-${slug}`);
    const submitButton = form.querySelector("button[type='submit']");
    if (!slug || !log || !form || !input) {
      return;
    }

    submitButton.disabled = true;

    fetch(`/chat/api/post/${slug}/messages/`, { credentials: "same-origin" })
      .then((response) => response.ok ? response.json() : { messages: [] })
      .then((data) => {
        data.messages.forEach((msg) => pcAppend(log, msg));
      })
      .catch(() => null);

    const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
    const socket = new WebSocket(`${wsScheme}://${window.location.host}/ws/chat/post/${slug}/`);

    socket.onopen = function () {
      status.textContent = "Connected";
      submitButton.disabled = false;
    };

    socket.onmessage = function (event) {
      const data = JSON.parse(event.data);
      if (data.type === "chat.message") {
        pcAppend(log, data);
      }
    };

    socket.onerror = function () {
      status.textContent = "Connection error. Refresh the page or check the server logs.";
    };

    socket.onclose = function () {
      status.textContent = "Disconnected. Refresh to reconnect.";
      submitButton.disabled = true;
    };

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      const message = input.value.trim();
      if (!message || socket.readyState !== WebSocket.OPEN) {
        status.textContent = "Waiting for the websocket connection...";
        return;
      }
      socket.send(JSON.stringify({ message }));
      input.value = "";
    });
  })();
</script>
