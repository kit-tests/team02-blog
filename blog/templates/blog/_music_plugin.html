{% load static %}

<section class="music-plugin" aria-label="Music player">
  <h2 class="music-title">Background Music</h2>
  <p class="music-note">Choose a song from the list. The first song will try to auto-play on page entry.</p>

  <div class="music-controls">
    <label for="song-select">Song</label>
    <select id="song-select" name="song-select">
      <option value="{% static 'blog/audio/song1.mp3' %}">Song 1</option>
      <option value="{% static 'blog/audio/song2.mp3' %}">Song 2</option>
      <option value="{% static 'blog/audio/song3.mp3' %}">Song 3</option>
    </select>
  </div>

  <audio id="site-music-player" controls autoplay preload="metadata" aria-label="Website music player">
    <source src="{% static 'blog/audio/song1.mp3' %}" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</section>

<style>
  .music-plugin {
    margin-top: 1.5rem;
    padding: 1rem;
    border: 1px solid #d6deeb;
    border-radius: 12px;
    background: linear-gradient(135deg, #f8fbff, #eef5ff);
  }

  .music-title {
    margin: 0 0 0.35rem;
    font-size: 1.2rem;
  }

  .music-note {
    margin: 0 0 0.8rem;
    color: #2c3e50;
    font-size: 0.95rem;
  }

  .music-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.8rem;
  }

  .music-controls select {
    padding: 0.45rem 0.65rem;
    border-radius: 8px;
    border: 1px solid #a9bdd8;
    font: inherit;
  }

  #site-music-player {
    width: min(520px, 100%);
  }
</style>

<script>
// Generated by GitHub Copilot
(function () {
  const selectEl = document.getElementById("song-select");
  const player = document.getElementById("site-music-player");

  if (!selectEl || !player) {
    return;
  }

  /**
   * Syncs the audio source with the selected song.
   */
  function updateSongSource() {
    const selectedUrl = selectEl.value;
    if (!selectedUrl) {
      return;
    }

    player.src = selectedUrl;
    player.load();
  }

  /**
   * Attempts to play audio and quietly handles autoplay policy blocks.
   */
  async function playSelectedSong() {
    updateSongSource();
    try {
      await player.play();
    } catch (error) {
      // Browser autoplay policy may block sound until user interaction.
    }
  }

  selectEl.addEventListener("change", playSelectedSong);

  // Auto-play the first song when entering the website.
  selectEl.selectedIndex = 0;
  playSelectedSong();

  // Fallback for stricter browsers: retry once after first user interaction.
  document.addEventListener(
    "click",
    function retryOnFirstInteraction() {
      playSelectedSong();
      document.removeEventListener("click", retryOnFirstInteraction);
    },
    { once: true }
  );
})();
</script>
