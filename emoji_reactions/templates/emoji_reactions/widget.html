{% load static %}
{# Generated by GitHub Copilot #}
<link rel="stylesheet" href="{% static 'blog/widget.css' %}">

<div class="emoji-reactions{% if selected_reaction %} is-locked{% endif %}"
     role="group"
     aria-label="Emoji reactions">

  {# Existing reaction pills #}
  <div class="emoji-reactions__pills">
    {% for btn in buttons %}
      {% if btn.count > 0 %}
        <form method="post" action="{% url 'emoji-react' %}" style="display:inline">
          {% csrf_token %}
          <input type="hidden" name="content_type_id" value="{{ content_type_id }}">
          <input type="hidden" name="object_id" value="{{ object_id }}">
          <input type="hidden" name="emoji" value="{{ btn.emoji }}">
          <input type="hidden" name="next_url" value="{{ next_url }}">
          <button
            type="submit"
            class="emoji-reactions__pill{% if selected_reaction == btn.emoji %} is-selected{% endif %}"
            aria-label="React with {{ btn.emoji }}, {{ btn.count }} reaction{{ btn.count|pluralize }}"
            aria-pressed="{% if selected_reaction == btn.emoji %}true{% else %}false{% endif %}"
          >
            <span class="emoji-reactions__pill-emoji" aria-hidden="true">{{ btn.emoji }}</span>
            <span class="emoji-reactions__pill-count">{{ btn.count }}</span>
          </button>
        </form>
      {% endif %}
    {% endfor %}
  </div>

  {# Add-reaction button + popup picker #}
  <div style="position:relative;display:inline-block">
    <button
      type="button"
      class="emoji-reactions__add-button"
      aria-label="Add a reaction"
      aria-haspopup="true"
      aria-expanded="false"
      aria-controls="emoji-popup-{{ object_id }}"
      onclick="
        var btn = this;
        var popup = document.getElementById('emoji-popup-{{ object_id }}');
        var isOpen = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
        popup.hidden = isOpen;
      "
    >
      <span class="emoji-reactions__add-text" aria-hidden="true">＋ Add</span>
    </button>

    <div
      id="emoji-popup-{{ object_id }}"
      class="emoji-reactions__popup"
      hidden
      role="dialog"
      aria-label="Choose a reaction"
    >
      <div class="emoji-reactions__popup-grid">
        {% for btn in buttons %}
          <form method="post" action="{% url 'emoji-react' %}">
            {% csrf_token %}
            <input type="hidden" name="content_type_id" value="{{ content_type_id }}">
            <input type="hidden" name="object_id" value="{{ object_id }}">
            <input type="hidden" name="emoji" value="{{ btn.emoji }}">
            <input type="hidden" name="next_url" value="{{ next_url }}">
            <button
              type="submit"
              class="emoji-reactions__popup-option"
              aria-label="React with {{ btn.emoji }}"
            >
              <span class="emoji-reactions__popup-emoji" aria-hidden="true">{{ btn.emoji }}</span>
            </button>
          </form>
        {% endfor %}
      </div>
    </div>
  </div>

</div>
